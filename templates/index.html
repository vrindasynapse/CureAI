<!DOCTYPE html>
<html>
<head>
    <title>CureAI - Disease Prediction</title>

    <style>

        body{
            font-family:Arial;
            background:#eef5ff;
            margin:0;
        }

        .container{
            width:70%;
            margin:auto;
            margin-top:40px;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0 0 15px rgba(0,0,0,.15);
        }

        h1{
            text-align:center;
            color:#1565c0;
        }

        p{
            text-align:center;
            color:#555;
        }

        select{
            width:100%;
            height:350px;
            padding:10px;
            font-size:15px;
        }

        button{
            margin-top:20px;
            width:100%;
            padding:15px;
            background:#1565c0;
            color:white;
            border:none;
            border-radius:8px;
            font-size:18px;
            cursor:pointer;
        }

        button:hover{
            background:#0d47a1;
        }

        .result{
            margin-top:30px;
            padding:20px;
            background:#d4edda;
            border-radius:10px;
            text-align:center;
            font-size:22px;
            color:#155724;
            font-weight:bold;
        }

    </style>

</head>

<body>

<div class="container">

<h1>🩺 CureAI</h1>

<p style="
margin-top:-8px;
margin-bottom:25px;
font-size:15px;
letter-spacing:1px;
color:#777;
text-transform:uppercase;
">


<p>Select your symptoms and click Predict Disease.</p>

<form action="/predict" method="POST">

<select multiple name="symptoms">

{% for symptom in symptoms %}

<option value="{{ symptom }}">{{ symptom }}</option>

{% endfor %}

</select>

<button type="submit">

Predict Disease

</button>

</form>

{% if prediction %}

<div class="result">

Predicted Disease

<br><br>

{{ prediction }}

</div>

{% endif %}

</div>

<footer style="
margin-top:40px;
padding:20px;
text-align:center;
font-size:15px;
color:#666;
border-top:1px solid #ddd;
">

<p>Made with ❤️ using Machine Learning & Flask</p>

<p><strong>Developed by Vrinda Prakash Vishwakarma</strong></p>

<p>© 2026 CureAI</p>

</footer>

</body>
</html>
